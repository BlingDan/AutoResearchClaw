project:
  name: "local-win-minimal"
  mode: "full-auto"

research:
  topic: "Memorization-Aware Federated PEFT Unlearning for Instruction Tuning"
  domains:
    - "machine-learning"
  daily_paper_count: 5
  quality_threshold: 3.5

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 2
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

# Keep bridge features off for local-only usage.
openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://novazacary.top/v1"
  base_urls:
    - "https://novazacary.top/v1"
    - "https://v1.cdks.work/v1"
  api_key_env: "OPENAI_API_KEY"
  fallback_api_key_env: "OPENAI_API_KEY_BACKUP"
  fallback_model: "glm-5"
  api_key: ""
  s2_base_url: "https://ai4scholar.net"
  timeout_sec: 30
  primary_model: "gpt-5.3-codex"
  fallback_models:
    - "gpt-5.4"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/Scripts/python.exe"
    gpu_required: false
    max_memory_mb: 4096
  # Disable optional heavy code-generation path by default.
  opencode:
    enabled: false

  # Local run: disable figure auto-generation to reduce run complexity/noise.
  figure_agent:
    enabled: false

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
